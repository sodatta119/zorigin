name: Release

# Push a tag like v0.1.0 to build installers and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .app + .dmg
        working-directory: networking/crates/zap-desktop
        run: cargo bundle --release
      - name: Build CLI
        working-directory: networking
        run: cargo build --release --package zap-cli
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp networking/target/release/bundle/dmg/zap.dmg dist/zap-macos.dmg
          cp networking/target/release/zap dist/zap-macos-cli
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap-macos.dmg
            dist/zap-macos-cli

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build GUI + CLI
        working-directory: networking
        run: cargo build --release --package zap-desktop --package zap-cli
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item networking/target/release/zap-desktop.exe dist/
          Copy-Item networking/target/release/zap.exe dist/zap-cli.exe
          Compress-Archive -Path dist/* -DestinationPath dist/zap-windows.zip -Force
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/zap-windows.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .deb + CLI
        working-directory: networking
        run: |
          ( cd crates/zap-desktop && cargo bundle --release --format deb )
          cargo build --release --package zap-cli
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp networking/target/release/bundle/deb/*.deb dist/zap-linux.deb
          cp networking/target/release/zap-desktop dist/zap-linux
          cp networking/target/release/zap dist/zap-linux-cli
          tar -C dist -czf dist/zap-linux.tar.gz zap-linux zap-linux-cli
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap-linux.deb
            dist/zap-linux.tar.gz
