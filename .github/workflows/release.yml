name: Release

# Push a tag like v0.1.0 to build installers and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .app + .dmg (Zap + Zulu)
        working-directory: networking
        run: |
          ( cd crates/zap-desktop && cargo bundle --release )
          ( cd crates/zulu-desktop && cargo bundle --release )
      - name: Build CLI
        working-directory: networking
        run: cargo build --release --package zap-cli
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp networking/target/release/bundle/dmg/zap.dmg dist/zap-macos.dmg
          cp networking/target/release/bundle/dmg/Zulu.dmg dist/zulu-macos.dmg
          cp networking/target/release/zap dist/zap-macos-cli
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap-macos.dmg
            dist/zulu-macos.dmg
            dist/zap-macos-cli

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Insurance for TLS crypto asm on MSVC (ring ships pregenerated objects for
      # this target, so this is usually a no-op, but it guarantees a clean build).
      - uses: ilammy/setup-nasm@v1
      - name: Build GUIs + CLI
        working-directory: networking
        run: cargo build --release --package zap-desktop --package zulu-desktop --package zap-cli
      - name: Package zips
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          # Zap (file transfer): GUI + CLI.
          New-Item -ItemType Directory -Force dist/zap | Out-Null
          Copy-Item networking/target/release/zap-desktop.exe dist/zap/
          Copy-Item networking/target/release/zap.exe dist/zap/zap-cli.exe
          Compress-Archive -Path dist/zap/* -DestinationPath dist/zap-windows.zip -Force
          # Zulu (clipboard sync): GUI only.
          Copy-Item networking/target/release/zulu-desktop.exe dist/
          Compress-Archive -Path dist/zulu-desktop.exe -DestinationPath dist/zulu-windows.zip -Force
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap-windows.zip
            dist/zulu-windows.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .deb + CLI (Zap + Zulu)
        working-directory: networking
        run: |
          ( cd crates/zap-desktop && cargo bundle --release --format deb )
          ( cd crates/zulu-desktop && cargo bundle --release --format deb )
          cargo build --release --package zap-cli
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp networking/target/release/bundle/deb/zap*.deb dist/zap-linux.deb
          cp networking/target/release/bundle/deb/[Zz]ulu*.deb dist/zulu-linux.deb
          cp networking/target/release/zap-desktop dist/zap-linux
          cp networking/target/release/zulu-desktop dist/zulu-linux
          cp networking/target/release/zap dist/zap-linux-cli
          tar -C dist -czf dist/zap-linux.tar.gz zap-linux zap-linux-cli
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap-linux.deb
            dist/zulu-linux.deb
            dist/zap-linux.tar.gz

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # The Zulu Android app is pure Kotlin (no JNI), so the SDK that ships on
      # the runner is enough - no NDK or Rust cross-compile needed.
      - name: Build APK
        working-directory: networking/android/zulu
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Collect artifact
        run: |
          mkdir -p dist
          cp networking/android/zulu/app/build/outputs/apk/debug/app-debug.apk dist/zulu-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/zulu-android.apk
