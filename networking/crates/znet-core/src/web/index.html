<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zap</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23f5a623' d='M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z'/%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light dark;
    --accent: #f5a623;
    --accent-2: #ff8c42;
    /* Soft, warm light theme - not stark white */
    --bg: #f6f5f2;
    --bg-tint: #fbf7ef;
    --fg: #23211d;
    --muted: #86807636;
    --muted-fg: #7c766c;
    --card: #ffffff;
    --line: rgba(0,0,0,0.07);
    --hover: rgba(0,0,0,0.035);
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 34px rgba(120,90,20,0.08);
    --glow: rgba(245,166,35,0.28);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d0d0f;
      --bg-tint: #131218;
      --fg: #f1f1f3;
      --muted-fg: #8b8b93;
      --card: #16161a;
      --line: rgba(255,255,255,0.09);
      --hover: rgba(255,255,255,0.05);
      --shadow: 0 8px 30px rgba(0,0,0,0.5);
      --glow: rgba(245,166,35,0.22);
    }
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; padding: 22px 16px 80px;
    max-width: 680px; margin-inline: auto;
    color: var(--fg);
    background:
      radial-gradient(1200px 400px at 50% -160px, var(--glow), transparent 70%),
      linear-gradient(var(--bg-tint), var(--bg) 240px);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---- entrance animation ---- */
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .rise { animation: rise .55s cubic-bezier(.2,.7,.2,1) both; }
  @media (prefers-reduced-motion: reduce) { .rise { animation: none; } }

  header { display: flex; align-items: center; gap: 13px; margin-bottom: 26px; }
  .logo {
    position: relative; width: 46px; height: 46px; flex: none;
    display: grid; place-items: center;
    background: linear-gradient(145deg, color-mix(in srgb, var(--accent) 26%, transparent), color-mix(in srgb, var(--accent-2) 14%, transparent));
    border-radius: 13px;
    box-shadow: 0 6px 18px var(--glow);
  }
  .logo svg { width: 26px; height: 26px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.2)); animation: bolt 3.4s ease-in-out infinite; }
  @keyframes bolt { 0%,88%,100% { transform: scale(1) rotate(0); } 92% { transform: scale(1.16) rotate(-6deg); } 96% { transform: scale(1.16) rotate(4deg); } }
  .brand h1 { margin: 0; font-size: 23px; font-weight: 750; letter-spacing: -0.02em; }
  .brand p { margin: 1px 0 0; font-size: 12.5px; color: var(--muted-fg); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 15px 17px; min-height: 30px;
  }
  .card-head + .body { border-top: 1px solid var(--line); }
  .card-head h2 { margin: 0; font-size: 12px; font-weight: 650; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-fg); }

  /* Drop zone */
  #drop {
    margin: 16px;
    border: 2px dashed color-mix(in srgb, var(--fg) 16%, transparent);
    border-radius: 14px;
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: border-color .18s, background .18s, transform .18s;
  }
  #drop:hover { border-color: color-mix(in srgb, var(--accent) 55%, transparent); }
  #drop.over { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); transform: scale(1.015); }
  #drop input { display: none; }
  #drop .big { font-weight: 600; font-size: 15px; }
  #drop .big b { color: var(--accent); }
  #drop .hint { color: var(--muted-fg); font-size: 12.5px; margin-top: 5px; }
  #drop .hint code { background: var(--hover); padding: 1px 7px; border-radius: 6px; font-size: 12px; }

  ul { list-style: none; margin: 0; padding: 0; }

  #uploads { padding: 0 16px 6px; }
  #uploads li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-top: 1px solid var(--line); font-size: 13.5px;
  }
  #uploads .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar { flex: 1.2; height: 6px; border-radius: 99px; background: var(--hover); overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .18s ease; }
  .tag { font-size: 11.5px; min-width: 46px; text-align: right; color: var(--muted-fg); font-variant-numeric: tabular-nums; }
  .tag.done { color: #2e9e57; } .tag.err { color: #e0554b; }
  .rate { font-size: 11px; min-width: 62px; text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }
  .pause {
    flex: none; cursor: pointer; padding: 0; width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent); background: none;
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-radius: 50%;
  }
  .pause svg { width: 15px; height: 15px; fill: currentColor; display: block; }
  .pause:hover { background: color-mix(in srgb, var(--accent) 14%, transparent); }
  .pause:active { transform: scale(.92); }
  .pause[hidden] { display: none; }
  .linkbtn { font: inherit; font-size: 12.5px; color: var(--accent); background: none; border: none; padding: 0; cursor: pointer; text-decoration: underline; }
  #uploads .sub { flex: none; font-size: 11px; color: var(--muted-fg); min-width: 0; }
  #uploads .name .folder { color: var(--accent); }
  #uploads .incoming .hint { display: block; font-size: 11px; color: var(--muted-fg); margin-top: 2px; }
  #uploads .incoming .tag { color: var(--accent); }
  .clearx {
    flex: none; cursor: pointer; padding: 0; width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted-fg); background: none; border: none; border-radius: 50%;
  }
  .clearx svg { width: 14px; height: 14px; fill: currentColor; display: block; }
  .clearx:hover { color: #e0554b; background: color-mix(in srgb, #e0554b 14%, transparent); }
  .clearx:active { transform: scale(.9); }

  /* Breadcrumb */
  .crumbs { display: flex; flex-wrap: wrap; align-items: center; gap: 1px; font-size: 13px; min-width: 0; }
  .crumbs button {
    font: inherit; background: none; border: none; cursor: pointer; color: var(--accent);
    padding: 4px 7px; border-radius: 8px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: background .12s;
  }
  .crumbs button:hover { background: var(--hover); }
  .crumbs button:last-child { color: var(--fg); font-weight: 600; cursor: default; }
  .crumbs .sep { color: var(--muted-fg); font-size: 11px; opacity: .7; }
  .icon-btn {
    font: inherit; font-size: 15px; line-height: 1; cursor: pointer; color: var(--fg);
    background: none; border: 1px solid var(--line); border-radius: 9px; padding: 6px 10px;
    transition: background .12s, transform .3s;
  }
  .icon-btn:hover { background: var(--hover); }
  .icon-btn.spin { transform: rotate(360deg); }
  .head-actions { display: flex; align-items: center; gap: 8px; flex: none; }
  .search {
    font: inherit; font-size: 13px; padding: 7px 11px; width: 132px;
    color: var(--fg); background: var(--hover);
    border: 1px solid var(--line); border-radius: 9px; outline: none;
    transition: border-color .15s, width .2s;
  }
  .search::placeholder { color: var(--muted-fg); }
  .search:focus { border-color: color-mix(in srgb, var(--accent) 60%, transparent); width: 150px; }
  @media (max-width: 420px) { .search { width: 108px; } .search:focus { width: 120px; } }

  /* File / folder rows */
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 17px; border-top: 1px solid var(--line);
    cursor: pointer; text-decoration: none; color: inherit;
    transition: background .12s, padding-left .15s;
    animation: rise .4s ease both;
  }
  .row:hover { background: var(--hover); padding-left: 21px; }
  .row:active { background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .row .ico { width: 24px; text-align: center; font-size: 18px; flex: none; }
  .row .label { flex: 1; overflow: hidden; min-width: 0; }
  .row .label .nm, .row .label { text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
  .row .label .path { display: block; font-size: 11px; color: var(--muted-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .meta { font-size: 11.5px; color: var(--muted-fg); font-variant-numeric: tabular-nums; }
  .row .chev { color: var(--muted-fg); font-size: 13px; opacity: .6; }
  .row .dlzip {
    flex: none; display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; padding: 0; cursor: pointer;
    color: var(--muted-fg); background: none; border: none; border-radius: 8px;
  }
  .row .dlzip:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .row .dlzip svg { display: block; }
  .empty, .loading { padding: 30px 16px; text-align: center; color: var(--muted-fg); font-size: 13.5px; }
  .unreachable { padding: 26px 20px; text-align: center; color: var(--muted-fg); font-size: 13.5px; }
  .unreachable .big { font-size: 14.5px; font-weight: 650; color: var(--fg); margin-bottom: 6px; }
  .unreachable .big::before { content: "⚠ "; color: var(--accent); }
  .unreachable ul { list-style: none; margin: 8px 0 14px; padding: 0; line-height: 1.55; }
  .unreachable .retry {
    font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; color: #fff;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border: none; border-radius: 8px; padding: 8px 18px;
  }
  .unreachable .retry:active { transform: scale(.97); }
  .spinner {
    display: inline-block; width: 15px; height: 15px; vertical-align: -3px; margin-right: 8px;
    border: 2px solid color-mix(in srgb, var(--fg) 20%, transparent);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header class="rise">
    <span class="logo"><svg viewBox="0 0 24 24"><path fill="var(--accent)" d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z"/></svg></span>
    <div class="brand">
      <h1>Zap</h1>
      <p>Lightning-fast file transfer over Wi-Fi</p>
    </div>
  </header>

  <section class="card rise" style="animation-delay:.06s">
    <div class="card-head"><h2>Send files</h2></div>
    <div class="body">
      <label id="drop">
        <input type="file" id="file" multiple>
        <input type="file" id="folder" webkitdirectory>
        <div class="big"><b>Tap to choose files</b> or drop them here</div>
        <div class="hint">Uploads into <code id="uploadTarget">this folder</code> · <button type="button" id="pickFolder" class="linkbtn">send a whole folder</button></div>
      </label>
      <ul id="uploads"></ul>
    </div>
  </section>

  <section class="card rise" style="animation-delay:.12s">
    <div class="card-head">
      <nav class="crumbs" id="crumbs"></nav>
      <div class="head-actions">
        <input id="search" class="search" type="search" placeholder="Search files…" autocomplete="off" spellcheck="false">
        <button class="icon-btn" id="refresh" title="Refresh">↻</button>
      </div>
    </div>
    <ul id="list" class="body"><li class="loading">Loading…</li></ul>
  </section>

<script>
const $ = (s) => document.querySelector(s);
let currentPath = "";

function fmtSize(n) {
  if (n == null) return "";
  const u = ["B", "KB", "MB", "GB", "TB"];
  let i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return (i === 0 ? n : n.toFixed(1)) + " " + u[i];
}
function joinPath(base, name) { return base ? base + "/" + name : name; }
function parentDir(path) { const i = path.lastIndexOf("/"); return i < 0 ? "" : path.slice(0, i); }

const FOLDER_SVG = `<svg viewBox="0 0 24 24" width="21" height="21"><path fill="#f5b301" d="M10 4H4c-1.1 0-1.99 0.9 -1.99 2L2 18c0 1.1 0.9 2 2 2h16c1.1 0 2-0.9 2-2V8c0-1.1-0.9-2-2-2h-8l-2-2z"/></svg>`;
const FILE_SVG = `<svg viewBox="0 0 24 24" width="19" height="19"><path fill="#9aa0a6" d="M14 2H6c-1.1 0-2 0.9-2 2v16c0 1.1 0.9 2 2 2h12c1.1 0 2-0.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>`;
const DLZIP_SVG = `<svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`;

async function loadDir(path) {
  const listEl = $("#list");
  listEl.innerHTML = '<li class="loading"><span class="spinner"></span>Loading…</li>';
  let reached = false;
  try {
    const res = await fetch("/api/list?path=" + encodeURIComponent(path));
    reached = true; // the host answered - any error below is folder-level, not connectivity
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentPath = data.path || "";
    renderCrumbs(currentPath);
    renderList(data.entries || []);
    $("#uploadTarget").textContent = currentPath ? "/" + currentPath : "the home folder";
  } catch (e) {
    if (reached) {
      listEl.innerHTML = '<li class="empty">Could not open this folder.</li>';
    } else {
      // The request never reached the host - a connectivity problem, not a bad folder.
      showUnreachable(path);
    }
  }
}

// Shown when a request can't reach the host at all. On a home router the usual
// cause is the two devices not being on the same Wi-Fi, or the router's
// "AP / client isolation" blocking device-to-device traffic.
function showUnreachable(path) {
  const listEl = $("#list");
  const li = document.createElement("li");
  li.className = "unreachable";
  li.innerHTML =
    '<div class="big">Can\'t reach this device</div>' +
    "<ul>" +
      "<li>Both devices must be on the <b>same Wi-Fi</b>.</li>" +
      "<li>Turn off your router's <b>AP / client isolation</b>.</li>" +
      "<li>Make sure the host hasn't stopped sharing.</li>" +
    "</ul>" +
    '<button class="retry">Try again</button>';
  li.querySelector(".retry").onclick = () => loadDir(path);
  listEl.innerHTML = "";
  listEl.appendChild(li);
}

function renderCrumbs(path) {
  const crumbs = $("#crumbs");
  crumbs.innerHTML = "";
  const parts = path ? path.split("/") : [];
  const mk = (label, target, isLast) => {
    const b = document.createElement("button");
    b.textContent = label;
    if (!isLast) b.onclick = () => loadDir(target);
    crumbs.appendChild(b);
  };
  mk("🏠 Home", "", parts.length === 0);
  let acc = "";
  parts.forEach((p, i) => {
    const sep = document.createElement("span");
    sep.className = "sep"; sep.textContent = "›";
    crumbs.appendChild(sep);
    acc = joinPath(acc, p);
    mk(p, acc, i === parts.length - 1);
  });
}

function renderList(entries) {
  const listEl = $("#list");
  listEl.innerHTML = "";
  if (!entries.length) {
    listEl.innerHTML = '<li class="empty">This folder is empty.</li>';
    return;
  }
  entries.forEach((e, i) => {
    const li = document.createElement("li");
    const el = e.dir ? document.createElement("div") : document.createElement("a");
    el.className = "row";
    el.style.animationDelay = Math.min(i * 28, 400) + "ms"; // staggered reveal
    if (e.dir) {
      el.innerHTML = `<span class="ico">${FOLDER_SVG}</span><span class="label"></span><button class="dlzip" title="Download as zip" aria-label="Download folder as zip">${DLZIP_SVG}</button><span class="chev">›</span>`;
      el.onclick = () => loadDir(joinPath(currentPath, e.name));
      el.querySelector(".dlzip").onclick = (ev) => {
        ev.preventDefault(); ev.stopPropagation();
        downloadFolderZip(joinPath(currentPath, e.name));
      };
    } else {
      el.href = "/download?path=" + encodeURIComponent(joinPath(currentPath, e.name));
      el.setAttribute("download", e.name);
      el.innerHTML = `<span class="ico">${FILE_SVG}</span><span class="label"></span><span class="meta">${fmtSize(e.size)}</span><span class="chev">⬇</span>`;
    }
    el.querySelector(".label").textContent = e.name;
    li.appendChild(el);
    listEl.appendChild(li);
  });
}

// Trigger a browser download of a folder as a streamed .zip.
function downloadFolderZip(path) {
  const a = document.createElement("a");
  a.href = "/download-folder?path=" + encodeURIComponent(path);
  a.download = "";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

// ---- Search across the whole shared folder ----
async function loadSearch(query) {
  const listEl = $("#list");
  listEl.innerHTML = '<li class="loading"><span class="spinner"></span>Searching…</li>';
  try {
    const res = await fetch("/api/search?q=" + encodeURIComponent(query));
    const data = await res.json();
    renderSearchCrumbs(data.query || query);
    renderResults(data.entries || []);
  } catch (e) {
    listEl.innerHTML = '<li class="empty">Search failed.</li>';
  }
}

function renderSearchCrumbs(query) {
  const crumbs = $("#crumbs");
  crumbs.innerHTML = "";
  const home = document.createElement("button");
  home.textContent = "🏠 Home";
  home.onclick = () => exitSearch();
  crumbs.appendChild(home);
  const sep = document.createElement("span");
  sep.className = "sep"; sep.textContent = "›";
  crumbs.appendChild(sep);
  const cur = document.createElement("button");
  cur.textContent = "🔍 " + query;
  crumbs.appendChild(cur);
}

function renderResults(entries) {
  const listEl = $("#list");
  listEl.innerHTML = "";
  if (!entries.length) {
    listEl.innerHTML = '<li class="empty">No matching files.</li>';
    return;
  }
  entries.forEach((e, i) => {
    const li = document.createElement("li");
    const el = e.dir ? document.createElement("div") : document.createElement("a");
    el.className = "row";
    el.style.animationDelay = Math.min(i * 24, 360) + "ms";
    const loc = parentDir(e.path);
    const right = e.dir
      ? `<span class="chev">›</span>`
      : `<span class="meta">${fmtSize(e.size)}</span><span class="chev">⬇</span>`;
    el.innerHTML = `<span class="ico">${e.dir ? FOLDER_SVG : FILE_SVG}</span>` +
      `<span class="label"><span class="nm"></span><small class="path"></small></span>${right}`;
    el.querySelector(".nm").textContent = e.name;
    el.querySelector(".path").textContent = loc ? "in /" + loc : "in Home";
    if (e.dir) {
      el.onclick = () => { exitSearch(); loadDir(e.path); };
    } else {
      el.href = "/download?path=" + encodeURIComponent(e.path);
      el.setAttribute("download", e.name);
    }
    li.appendChild(el);
    listEl.appendChild(li);
  });
}

function exitSearch() {
  $("#search").value = "";
  loadDir(currentPath);
}

// ---- Upload into the current folder (files or whole folders) ----
const drop = $("#drop"), fileInput = $("#file"), folderInput = $("#folder"), uploads = $("#uploads");
["dragenter", "dragover"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", onDrop);
fileInput.addEventListener("change", () => { uploadFiles(fileInput.files); fileInput.value = ""; });
folderInput.addEventListener("change", () => {
  const es = entriesFromInput(folderInput.files);
  if (es.length) uploadFolderEntries(es);
  folderInput.value = "";
});
$("#pickFolder").addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); folderInput.click(); });

function uploadFiles(list) { for (const f of list) uploadOne(f); }

// Folder picked via the directory input: each File carries its webkitRelativePath.
function entriesFromInput(fileList) {
  return [...fileList].map((f) => ({ file: f, relPath: f.webkitRelativePath || f.name }));
}

// Drag-drop: if a directory was dropped, walk the tree and upload it as a folder.
async function onDrop(e) {
  const items = e.dataTransfer.items;
  const roots = items ? [...items].map((it) => it.webkitGetAsEntry && it.webkitGetAsEntry()).filter(Boolean) : [];
  if (!roots.length || !roots.some((r) => r.isDirectory)) { uploadFiles(e.dataTransfer.files); return; }
  const entries = [];
  for (const r of roots) await collectEntry(r, "", entries);
  if (entries.length) uploadFolderEntries(entries);
}

// Recursively collect {file, relPath} from a dropped FileSystemEntry tree.
function collectEntry(entry, prefix, out) {
  return new Promise((resolve) => {
    if (entry.isFile) {
      entry.file((f) => { out.push({ file: f, relPath: prefix + entry.name }); resolve(); }, () => resolve());
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      const dirPath = prefix + entry.name + "/";
      const readBatch = () => reader.readEntries(async (batch) => {
        if (!batch.length) { resolve(); return; }
        for (const child of batch) await collectEntry(child, dirPath, out);
        readBatch(); // readEntries yields in batches - keep going until empty
      }, () => resolve());
      readBatch();
    } else { resolve(); }
  });
}

function newCtl() { return { paused: false, waiters: [], xhr: null }; }
function waitResume(ctl) { return new Promise((r) => ctl.waiters.push(r)); }

// Build an upload row (name + bar + rate + tag + pause icon) and return its handles.
function makeRow(text) {
  const li = document.createElement("li");
  li.innerHTML = `<span class="name"></span><div class="bar"><i></i></div><span class="rate"></span><span class="tag">0%</span><button class="pause" title="Pause" aria-label="Pause">${PAUSE_ICON}</button>`;
  li.querySelector(".name").textContent = text;
  uploads.prepend(li);
  const ui = { bar: li.querySelector(".bar > i"), tag: li.querySelector(".tag"), rate: li.querySelector(".rate"), lastT: performance.now(), lastDone: 0, speed: 0 };
  return { li, ui, pauseBtn: li.querySelector(".pause") };
}

function wirePause(pauseBtn, ctl, ui) {
  pauseBtn.onclick = () => {
    if (ctl.paused) {
      ctl.paused = false;
      pauseBtn.innerHTML = PAUSE_ICON; pauseBtn.title = pauseBtn.ariaLabel = "Pause";
      ctl.waiters.splice(0).forEach((r) => r());
    } else {
      ctl.paused = true;
      pauseBtn.innerHTML = PLAY_ICON; pauseBtn.title = pauseBtn.ariaLabel = "Resume";
      ui.rate.textContent = "";
      if (ctl.xhr) ctl.xhr.abort();
    }
  };
}

// ---- Resumable, integrity-verified upload ----
// Files stream to the host in chunks. The whole-file CRC-32 is computed as we
// read, and sent with the final chunk so the host can verify the file arrived
// intact ("✓ verified"). If the connection drops, we ask the host how many
// bytes it already has (HEAD → X-Zap-Offset) and resume from there - so a 5 GB
// transfer survives a Wi-Fi blip instead of starting over.
const UPLOAD_CHUNK = 8 * 1024 * 1024; // 8 MB
const MAX_RESUME_ATTEMPTS = 6;
const FOLDER_CONCURRENCY = 4; // files uploaded in parallel within a folder

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crcUpdate(crc, bytes) {
  let c = crc >>> 0;
  for (let i = 0; i < bytes.length; i++) c = (c >>> 8) ^ CRC_TABLE[(c ^ bytes[i]) & 0xff];
  return c >>> 0;
}
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

const PAUSE_ICON = `<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>`;
const PLAY_ICON = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
const CLEAR_ICON = `<svg viewBox="0 0 24 24"><path d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3L16.9 4.3z"/></svg>`;

// Ask the host to delete an interrupted upload's partial temp file.
function discardPartial(dir, name) {
  if (!name) return Promise.resolve();
  return fetch("/upload?path=" + encodeURIComponent(dir || "") + "&name=" + encodeURIComponent(name), { method: "DELETE" }).catch(() => {});
}

// Append a "clear" (×) button to a finished/interrupted row: removes the row and
// (when name is given) discards any host-side partial for it. No-op on the host
// for already-completed files, so it's safe to offer on every terminal row.
function addClearButton(li, dir, name) {
  if (li.querySelector(".clearx")) return;
  const b = document.createElement("button");
  b.className = "clearx"; b.title = b.ariaLabel = "Clear";
  b.innerHTML = CLEAR_ICON;
  b.onclick = (e) => { e.preventDefault(); e.stopPropagation(); discardPartial(dir, name); li.remove(); };
  li.appendChild(b);
}

// Single file → its own row.
async function uploadOne(file) {
  const { li, ui, pauseBtn } = makeRow(file.name);
  li.dataset.name = file.name;
  removeIncoming(file.name); // supersede any "resume" placeholder for this file
  const ctl = newCtl();
  wirePause(pauseBtn, ctl, ui);
  try {
    const { verified } = await runFile(
      file, currentPath, file.name, ctl,
      (done) => updateProgress(ui, done, file.size),
      (status) => { ui.rate.textContent = ""; ui.tag.textContent = status; ui.tag.classList.remove("done", "err"); },
    );
    markDone(ui, verified);
  } catch (e) {
    ui.rate.textContent = "";
    ui.tag.textContent = (e && e.msg) || "failed";
    ui.tag.classList.add("err");
  } finally {
    pauseBtn.hidden = true;
    addClearButton(li, currentPath, file.name); // clear/discard once it's terminal
  }
}

// Whole folder → one aggregate row with combined progress + ETA. Each file is
// still uploaded resumably and crc-verified; subfolders are recreated on the host.
async function uploadFolderEntries(entries) {
  const rootName = entries[0].relPath.split("/")[0] || "folder";
  const totalBytes = entries.reduce((s, e) => s + e.file.size, 0);
  const label = "📁 " + rootName + " (" + entries.length + (entries.length === 1 ? " file)" : " files)");
  const { li, ui, pauseBtn } = makeRow(label);
  const ctl = newCtl();
  wirePause(pauseBtn, ctl, ui);

  // Upload files with bounded concurrency - a big win for folders of many small
  // files (each transfer is latency-bound, so overlapping them hides round-trips).
  const perDone = new Array(entries.length).fill(0);
  const bump = () => updateAgg(ui, perDone.reduce((a, b) => a + b, 0), totalBytes);
  let done = 0, failed = 0, next = 0;
  const worker = async () => {
    for (;;) {
      const i = next++;               // atomic in single-threaded JS
      if (i >= entries.length) return;
      const { file, relPath } = entries[i];
      const relDir = relPath.split("/").slice(0, -1).join("/");
      const destDir = relDir ? joinPath(currentPath, relDir) : currentPath;
      try {
        await runFile(
          file, destDir, file.name, ctl,
          (fileDone) => { perDone[i] = fileDone; bump(); },
          (status) => { ui.tag.textContent = status; ui.tag.classList.remove("done", "err"); },
        );
        done++;
      } catch (e) { failed++; }
      perDone[i] = file.size;         // count the whole file as consumed
      bump();
    }
  };
  try {
    const lanes = Math.min(FOLDER_CONCURRENCY, entries.length);
    await Promise.all(Array.from({ length: lanes }, worker));
    ui.bar.style.width = "100%";
    ui.rate.textContent = "";
    ui.tag.textContent = failed ? (done + "/" + entries.length) : ("✓ " + done + (done === 1 ? " file" : " files"));
    ui.tag.classList.add(failed ? "err" : "done");
    loadDir(currentPath);
  } finally {
    pauseBtn.hidden = true;
    addClearButton(li); // remove the aggregate row (per-file partials clear via incoming rows)
  }
}

// Drive one file to completion with resume + pause. Reports progress via
// onProgress(doneBytes) and status text via onStatus(text). Returns {verified}
// or throws {fatal}. Reused by both single-file and folder uploads.
async function runFile(file, destDir, name, ctl, onProgress, onStatus) {
  const total = file.size;
  let attempt = 0;
  for (;;) {
    if (ctl.paused) { onStatus("paused"); await waitResume(ctl); attempt = 0; }
    try {
      return await sendFile(file, destDir, name, total, onProgress, ctl);
    } catch (e) {
      if (e && e.paused) continue;   // paused mid-chunk → loop back and wait
      if (e && e.fatal) throw e;     // integrity failure - don't retry
      if (++attempt > MAX_RESUME_ATTEMPTS) throw { fatal: true, msg: "failed" };
      onStatus("reconnecting…");
      await sleep(700 + attempt * 400);
    }
  }
}

// Read the file from 0, feeding every byte into the CRC, but only PUT the bytes
// the host doesn't already have (from its reported offset). Resumes cleanly even
// across a page reload because the CRC is recomputed over the whole file.
async function sendFile(file, destDir, name, total, onProgress, ctl) {
  let offset = await headOffset(destDir, name); // bytes already on the host
  let crc = 0xFFFFFFFF >>> 0;
  let readpos = 0;

  while (readpos < total) {
    if (ctl.paused) throw { paused: true };
    const end = Math.min(readpos + UPLOAD_CHUNK, total);
    const buf = new Uint8Array(await file.slice(readpos, end).arrayBuffer());
    crc = crcUpdate(crc, buf);
    if (end > offset) {
      const skip = Math.max(0, offset - readpos);
      const toSend = skip > 0 ? buf.subarray(skip) : buf;
      const putOffset = readpos + skip;
      const isLast = end === total;
      const finalCrc = isLast ? ((crc ^ 0xFFFFFFFF) >>> 0) : null;
      const res = await putChunk(destDir, name, putOffset, toSend, total, finalCrc, onProgress, ctl);
      if (res.resync !== undefined) throw { transient: true }; // host offset differs → restart
      offset = putOffset + toSend.length;
      if (isLast) return { verified: res.verified };
    }
    readpos = end;
  }

  // The host already holds every byte but hasn't finalized (e.g. a prior attempt
  // dropped just before the last response). Send an empty finalizing PUT.
  const finalCrc = (crc ^ 0xFFFFFFFF) >>> 0;
  const res = await putChunk(destDir, name, offset, new Uint8Array(0), total, finalCrc, onProgress, ctl);
  if (res.resync !== undefined) throw { transient: true };
  return { verified: res.verified };
}

function markDone(ui, verified) {
  ui.bar.style.width = "100%";
  ui.rate.textContent = "";
  ui.tag.textContent = verified ? "✓ verified" : "done";
  ui.tag.classList.remove("err");
  ui.tag.classList.add("done");
  loadDir(currentPath);
}

// Ask the host how many bytes of this file (at destDir) it already has.
async function headOffset(destDir, name) {
  try {
    const res = await fetch("/upload?path=" + encodeURIComponent(destDir) + "&name=" + encodeURIComponent(name), { method: "HEAD" });
    if (!res.ok) return 0;
    return parseInt(res.headers.get("X-Zap-Offset") || "0", 10) || 0;
  } catch (e) {
    return 0;
  }
}

// PUT one chunk at `offset` into destDir. Resolves {verified} on a finalizing
// chunk, {resync:<offset>} on a 409, or rejects {transient|fatal}. Calls
// onProgress(doneBytes) as it uploads (XHR gives progress; fetch does not).
function putChunk(destDir, name, offset, bytes, total, finalCrc, onProgress, ctl) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    ctl.xhr = xhr;
    const done = (fn, arg) => { ctl.xhr = null; fn(arg); };
    const url = "/upload?path=" + encodeURIComponent(destDir) + "&name=" + encodeURIComponent(name) + "&offset=" + offset;
    xhr.open("PUT", url);
    xhr.setRequestHeader("X-Zap-Total", String(total));
    if (finalCrc !== null) xhr.setRequestHeader("X-Zap-Crc32", (finalCrc >>> 0).toString(16));
    xhr.upload.onprogress = (e) => onProgress(offset + e.loaded);
    xhr.onload = () => {
      if (xhr.status === 409) { done(resolve, { resync: parseInt(xhr.getResponseHeader("X-Zap-Offset") || "0", 10) || 0 }); return; }
      if (xhr.status === 422) { done(reject, { fatal: true, msg: "verify failed" }); return; }
      if (xhr.status >= 200 && xhr.status < 300) {
        done(resolve, { verified: xhr.getResponseHeader("X-Zap-Verified") === "true" });
      } else { done(reject, { transient: true }); }
    };
    // A user pause calls xhr.abort() → onabort; anything else is a network error.
    xhr.onabort = () => done(reject, ctl.paused ? { paused: true } : { transient: true });
    xhr.onerror = () => done(reject, { transient: true });
    xhr.send(bytes);
  });
}

function updateProgress(ui, done, total) {
  const pct = total ? Math.min(100, Math.round((done / total) * 100)) : 100;
  ui.bar.style.width = pct + "%";
  ui.tag.textContent = pct + "%";
  ui.tag.classList.remove("done", "err");
  const now = performance.now(), dt = (now - ui.lastT) / 1000;
  if (dt >= 0.3) {
    const inst = (done - ui.lastDone) / dt;
    ui.speed = ui.speed ? ui.speed * 0.4 + inst * 0.6 : inst;
    if (ui.speed > 0) ui.rate.textContent = fmtSize(ui.speed) + "/s";
    ui.lastT = now; ui.lastDone = done;
  }
}

// Aggregate progress for a whole-folder upload: combined bar + speed + ETA.
function updateAgg(ui, done, total) {
  const pct = total ? Math.min(100, Math.round((done / total) * 100)) : 100;
  ui.bar.style.width = pct + "%";
  ui.tag.textContent = pct + "%";
  ui.tag.classList.remove("done", "err");
  const now = performance.now(), dt = (now - ui.lastT) / 1000;
  if (dt >= 0.3) {
    const inst = (done - ui.lastDone) / dt;
    ui.speed = ui.speed ? ui.speed * 0.4 + inst * 0.6 : inst;
    ui.lastT = now; ui.lastDone = done;
    if (ui.speed > 0) {
      const remain = (total - done) / ui.speed;
      ui.rate.textContent = fmtSize(ui.speed) + "/s · " + fmtEta(remain);
    }
  }
}

function fmtEta(sec) {
  if (!isFinite(sec) || sec < 0) return "";
  sec = Math.round(sec);
  if (sec < 60) return sec + "s";
  if (sec < 3600) return Math.round(sec / 60) + "m";
  return Math.floor(sec / 3600) + "h" + Math.round((sec % 3600) / 60) + "m";
}

// On load, show any uploads the host still holds a partial for (e.g. this page
// was refreshed mid-transfer). The bytes are safe on the host - re-selecting the
// same file resumes it from where it left off.
async function loadIncoming() {
  let data;
  try {
    const res = await fetch("/api/incoming");
    if (!res.ok) return;
    data = await res.json();
  } catch (e) { return; }
  for (const e of (data.entries || [])) {
    if ([...uploads.children].some((li) => li.dataset.name === e.name)) continue;
    const li = document.createElement("li");
    li.className = "incoming";
    li.dataset.name = e.name;
    li.innerHTML = `<span class="name"><b class="nm"></b><span class="hint">unfinished · re-select this file to resume</span></span><span class="rate"></span><span class="tag">interrupted</span>`;
    li.querySelector(".nm").textContent = e.name;
    li.querySelector(".rate").textContent = fmtSize(e.done) + " received";
    uploads.appendChild(li);
    addClearButton(li, e.path || "", e.name); // discard the host partial + remove row
  }
}

function removeIncoming(name) {
  uploads.querySelectorAll("li.incoming").forEach((li) => {
    if (li.dataset.name === name) li.remove();
  });
}

const refresh = $("#refresh");
refresh.onclick = () => {
  refresh.classList.add("spin");
  setTimeout(() => refresh.classList.remove("spin"), 350);
  const q = $("#search").value.trim();
  q ? loadSearch(q) : loadDir(currentPath);
};

const search = $("#search");
search.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const q = search.value.trim();
  q ? loadSearch(q) : loadDir(currentPath);
});
// Native clear button (the "x") fires a 'search' event with empty value.
search.addEventListener("search", () => {
  if (!search.value.trim()) loadDir(currentPath);
});

loadDir("");
loadIncoming();
</script>
</body>
</html>
